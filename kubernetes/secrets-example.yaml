apiVersion: v1
kind: Secret
metadata:
    name: barcode-scanner-secrets
type: Opaque
stringData:
    # PostgreSQL full connection string (required)
    DATABASE_URL: "postgresql://user:password@host:5432/barcode_scanner"
    # Redis connection string (required)
    REDIS_URL: "redis://redis-service:6379"
    # JWT (required)
    JWT_SECRET: "change-me-to-a-long-random-string"
    JWT_EXPIRES_IN: "7d"
    # Auth strategy: "nodemailer" for production, "mock" for testing
    AUTH_STRATEGY: "nodemailer"
    # SMTP — required when AUTH_STRATEGY=nodemailer
    SMTP_HOST: "smtp.example.com"
    SMTP_PORT: "587"
    SMTP_SECURE: "false"
    SMTP_USER: "no-reply@titanforgesystems.com.br"
    SMTP_PASS: "your-smtp-password"
    SMTP_FROM: "no-reply@titanforgesystems.com.br"
