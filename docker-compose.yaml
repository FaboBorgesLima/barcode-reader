services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: barcode
      POSTGRES_PASSWORD: barcode
      POSTGRES_DB: barcode_scanner
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    command:
      sh -c "npx prisma migrate deploy && npm run start:dev"
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
    env_file:
      - backend/.env
    depends_on:
      - postgres
    
  frontend:
    image: busybox  # placeholder — replace with real frontend service
  
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  postgres_data: