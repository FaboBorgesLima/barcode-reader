name: Deploy

on:
    push:
        tags:
            - "v*.*.*"

env:
    IMAGE: faboborgeslima/barcode-scanner

jobs:
    # ── 1. CI gate ──────────────────────────────────────────────────────────────
    ci:
        name: CI (lint / security / tests)
        uses: ./.github/workflows/ci.yml

    # ── 2. Build & push Docker image ────────────────────────────────────────────
    build:
        name: Build & Push Image
        runs-on: ubuntu-latest
        needs: ci
        outputs:
            image_tag: ${{ steps.meta.outputs.version }}

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Log in to DockerHub
              uses: docker/login-action@v3
              with:
                  username: ${{ secrets.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Docker metadata
              id: meta
              uses: docker/metadata-action@v5
              with:
                  images: ${{ env.IMAGE }}
                  tags: |
                      type=semver,pattern={{version}}
                      type=semver,pattern={{major}}.{{minor}}
                      type=raw,value=latest

            - name: Build & push
              uses: docker/build-push-action@v6
              with:
                  context: ./backend
                  push: true
                  platforms: linux/amd64
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

    # ── 3. Deploy to Kubernetes ──────────────────────────────────────────────────
    deploy:
        name: Deploy to Kubernetes
        runs-on: ubuntu-latest
        needs: build

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up kubectl
              uses: azure/setup-kubectl@v4

            - name: Set Kubernetes context
              uses: azure/k8s-set-context@v4
              with:
                  method: kubeconfig
                  kubeconfig: ${{ secrets.KUBE_CONFIG }}

            - name: Upsert Kubernetes secrets
              env:
                  DATABASE_URL: ${{ secrets.DATABASE_URL }}
                  REDIS_URL: ${{ secrets.REDIS_URL }}
                  JWT_SECRET: ${{ secrets.JWT_SECRET }}
                  JWT_EXPIRES_IN: ${{ secrets.JWT_EXPIRES_IN }}
                  AUTH_STRATEGY: ${{ secrets.AUTH_STRATEGY }}
                  SMTP_HOST: ${{ secrets.SMTP_HOST }}
                  SMTP_PORT: ${{ secrets.SMTP_PORT }}
                  SMTP_SECURE: ${{ secrets.SMTP_SECURE }}
                  SMTP_USER: ${{ secrets.SMTP_USER }}
                  SMTP_PASS: ${{ secrets.SMTP_PASS }}
                  SMTP_FROM: ${{ secrets.SMTP_FROM }}
                  IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
              run: |
                  kubectl create secret generic barcode-scanner-secrets \
                    --from-literal=DATABASE_URL="${DATABASE_URL}" \
                    --from-literal=REDIS_URL="${REDIS_URL}" \
                    --from-literal=JWT_SECRET="${JWT_SECRET}" \
                    --from-literal=JWT_EXPIRES_IN="${JWT_EXPIRES_IN}" \
                    --from-literal=AUTH_STRATEGY="${AUTH_STRATEGY}" \
                    --from-literal=SMTP_HOST="${SMTP_HOST}" \
                    --from-literal=SMTP_PORT="${SMTP_PORT}" \
                    --from-literal=SMTP_SECURE="${SMTP_SECURE}" \
                    --from-literal=SMTP_USER="${SMTP_USER}" \
                    --from-literal=SMTP_PASS="${SMTP_PASS}" \
                    --from-literal=SMTP_FROM="${SMTP_FROM}" \
                    --save-config \
                    --dry-run=client -o yaml | kubectl apply -f -

                  # Inject image tag into deployment manifest
                  sed "s/VERSION/${IMAGE_TAG}/g" kubernetes/deployment.yaml > /tmp/deployment.yaml

            - name: Apply manifests & roll out new image
              run: |
                  set -euo pipefail

                  kubectl apply -f kubernetes/database.yaml
                  kubectl apply -f kubernetes/redis.yaml
                  kubectl apply -f kubernetes/ingress.yaml
                  kubectl apply -f kubernetes/service.yaml
                  kubectl apply -f /tmp/deployment.yaml

                  kubectl rollout status deployment/barcode-scanner-deployment --timeout=120s

            - name: Run Prisma migrations
              run: |
                  POD_NAME=$(kubectl get pods -l app=barcode-scanner --field-selector=status.phase=Running -o jsonpath="{.items[0].metadata.name}")

                  echo "Running migrations on pod: $POD_NAME"

                  # Wait for the app to be fully ready
                  kubectl wait --for=condition=ready pod/$POD_NAME --timeout=60s

                  kubectl exec $POD_NAME -- npx prisma migrate deploy
